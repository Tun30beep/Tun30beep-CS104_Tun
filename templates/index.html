<a href="/add_customer"
        class="btn btn-orange">

            ➕ Add Customer

        </a>

        <a href="/add_order"
        class="btn btn-yellow">

            🧾 Add Order

        </a>

        <a href="/employees"
        class="btn btn-purple">

            👨‍🍳 Employees

        </a>

        <a href="/restaurant_tables"
        class="btn btn-dark">

            🍽️ Restaurant Tables

        </a>

    </div>


    <h2 class="section-title">

        Latest Orders

    </h2>

    <table>

        <tr>

            <th>Order ID</th>

            <th>Customer</th>

            <th>Table</th>

            <th>Food</th>

            <th>Total Price</th>

            <th>Status</th>

            <th>Actions</th>

        </tr>

        {% for order in orders %}

        <tr>

            <td>{{ order[0] }}</td>

            <td>{{ order[1] }}</td>

            <td>{{ order[2] }}</td>

            <td>{{ order[3] }}</td>

            <td>{{ order[4] }}</td>

            <td>{{ order[5] }}</td>

            <td>

                <a href="/edit_order/{{ order[0] }}"
                class="btn btn-yellow">

                    Edit

                </a>

                <a href="/delete_order/{{ order[0] }}"
                class="btn btn-red">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
