<!DOCTYPE html>
<html>

<head>

    <title>Add Order</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Add Order</h1>

    <form method="POST">

        <label>Customer Name</label>

        <input type="text"
        name="customer_name"
        required>


        <label>Table</label>

        <input type="text"
        name="table_name"
        required>


        <label>Food Item</label>

        <select name="item_id">

            {% for item in menu_items %}

            <option value="{{ item[0] }}">

                {{ item[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Quantity</label>

        <input type="number"
        name="quantity"
        required>


        <label>Total Price</label>

        <input type="number"
        step="0.01"
        name="total_price"
        required>


        <label>Status</label>

        <input type="text"
        name="status"
        required>


        <button type="submit">

            Add Order

        </button>

    </form>

</div>

</body>
</html>
