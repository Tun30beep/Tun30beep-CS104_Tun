  <select name="customer_id">

            {% for customer in customers %}

            <option value="{{ customer[0] }}">

                {{ customer[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Table</label>

        <select name="table_id">

            {% for table in tables %}

            <option value="{{ table[0] }}">

                Table {{ table[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Food Item</label>

        <select name="item_id">

            {% for item in menu_items %}

            <option value="{{ item[0] }}">

                {{ item[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Quantity</label>

        <input type="number"
        name="quantity"
        required>


        <label>Total Price</label>

        <input type="number"
        step="0.01"
        name="total_price"
        required>


        <label>Status</label>

        <input type="text"
        name="status"
        required>


        <button type="submit">

            Add Order

        </button>

    </form>

</div>

</body>
</html>
