<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Menu</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Menu Management</h1>
    <a href="/add_menu"
    class="btn btn-green">
        
        Add Menu

</a>

<br><br>

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>

        </tr>

        {% for item in menu_items %}

        <tr>

            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td>{{ item[3] }}</td>
            <td>{{ item[4] }}</td>

            <td>

                <a href="/edit_menu/{{ item[0] }}"
                class="btn btn-yellow">

                    Edit

                </a>

                <a href="/delete_menu/{{ item[0] }}"
                class="btn btn-red">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
