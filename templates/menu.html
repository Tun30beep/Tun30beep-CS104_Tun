<!DOCTYPE html>
<html>

<head>

    <title>Menu Management</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container">

    <h1>Menu Management</h1>

    <!-- Back to Dashboard -->
    <a class="btn home-btn" href="/">
        ← Restaurant Dashboard
    </a>

    <!-- Add Menu -->
    <a class="btn add-btn" href="/add">
        + Add Menu
    </a>

    <br><br>

    <table>

        <tr>
            <th>ID</th>
            <th>Menu</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Action</th>
        </tr>

        {% for item in menu_items %}

        <tr>

            <td>{{ item.item_id }}</td>
            <td>{{ item.item_name }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.price }}</td>
            <td>{{ item.stock }}</td>

            <td>

                <!-- Edit -->
                <a
                    class="btn edit-btn"
                    href="/edit/{{ item.item_id }}"
                >
                    Edit
                </a>

                <!-- Delete -->
                <a
                    class="btn delete-btn"
                    href="/delete/{{ item.item_id }}"
                >
                    Delete
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
