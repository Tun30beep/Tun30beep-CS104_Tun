<!DOCTYPE html>
<html>

<head>

    <title>Employees</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Employees</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Role</th>
            <th>Phone</th>

        </tr>

        {% for employee in employees %}

        <tr>

            <td>{{ employee[0] }}</td>
            <td>{{ employee[1] }}</td>
            <td>{{ employee[2] }}</td>
            <td>{{ employee[3] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
