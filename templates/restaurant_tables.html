<!DOCTYPE html>
<html>

<head>

    <title>Restaurant Tables</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Restaurant Tables</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Table Number</th>
            <th>Capacity</th>
            <th>Status</th>

        </tr>

        {% for table in tables %}

        <tr>

            <td>{{ table[0] }}</td>
            <td>{{ table[1] }}</td>
            <td>{{ table[2] }}</td>
            <td>{{ table[3] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
