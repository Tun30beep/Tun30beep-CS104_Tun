<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Restaurant Tables</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Restaurant Tables</h1>

    <a href="/" class="btn btn-blue">
        ← Dashboard
    </a>

    <table>

        <tr>
            <th>ID</th>
            <th>Table Number</th>
            <th>Capacity</th>
            <th>Status</th>
        </tr>

        {% for table in tables %}
        <tr>

            <td>{{ table.table_id }}</td>

            <td>{{ table.table_number }}</td>

            <td>{{ table.capacity }}</td>

            <td>{{ table.status }}</td>

        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
