<!DOCTYPE html>
<html>

<head>

    <title>Restaurant Tables</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Restaurant Tables</h1>

    <a href="/add_table"
    class="btn btn-green">

        Add Table

    </a>

    <br><br>

    <table>

        <tr>

            <th>ID</th>
            <th>Table Name</th>
            <th>Capacity</th>
            <th>Status</th>
            <th>Actions</th>

        </tr>

        {% for table in tables %}

        <tr>

            <td>{{ table[0] }}</td>
            <td>{{ table[1] }}</td>
            <td>{{ table[2] }}</td>
            <td>{{ table[3] }}</td>

            <td>

                <a href="/edit_table/{{ table[0] }}"
                class="btn btn-yellow">

                    Edit

                </a>

                <a href="/delete_table/{{ table[0] }}"
                class="btn btn-red">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
