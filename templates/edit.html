<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Menu</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Edit Menu</h1>

        <div class="button-group">

            <a href="/menu" class="btn btn-blue">
                ← Manage Menu
            </a>

        </div>

        <form method="POST">

            <label>Item Name</label>

            <input type="text"
            name="item_name"
            value="{{ menu_item[1] }}"
            required>


            <label>Category</label>

            <input type="text"
            name="category"
            value="{{ menu_item[2] }}"
            required>


            <label>Price</label>

            <input type="number"
            step="0.01"
            name="price"
            value="{{ menu_item[3] }}"
            required>


            <label>Stock</label>

            <input type="number"
            name="stock"
            value="{{ menu_item[4] }}"
            required>


            <button type="submit">

                Update Menu

            </button>

        </form>

    </div>

</body>
</html>
