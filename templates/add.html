<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Menu</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Add Menu</h1>

        <div class="button-group">

            <a href="/menu" class="btn btn-blue">
                ← Manage Menu
            </a>

        </div>

        <form method="POST">

            <label>Item Name</label>

            <input type="text"
            name="item_name"
            placeholder="Enter menu name"
            required>


            <label>Category</label>

            <input type="text"
            name="category"
            placeholder="Enter category"
            required>


            <label>Price</label>

            <input type="number"
            step="0.01"
            name="price"
            placeholder="Enter price"
            required>


            <label>Stock</label>

            <input type="number"
            name="stock"
            placeholder="Enter stock"
            required>


            <button type="submit">

                Add Menu

            </button>

        </form>

    </div>

</body>
</html>
