<!DOCTYPE html>
<html>

<head>

    <title>Edit Employee</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Edit Employee</h1>

    <form method="POST">

        <label>Name</label>

        <input type="text"
        name="name"
        value="{{ employee['name'] }}"
        required>


        <label>Role</label>

        <input type="text"
        name="role"
        value="{{ employee['role'] }}"
        required>


        <label>Phone</label>

        <input type="text"
        name="phone"
        value="{{ employee['phone'] }}"
        required>


        <button type="submit">

            Update Employee

        </button>

    </form>

</div>

</body>
</html>
