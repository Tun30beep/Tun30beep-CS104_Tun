<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Order</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Edit Order</h1>

    <form method="POST">

        <label>Customer</label>

        <select name="customer_id">

            {% for customer in customers %}

            <option value="{{ customer[0] }}">

                {{ customer[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Table</label>

        <select name="table_id">

            {% for table in tables %}

            <option value="{{ table[0] }}">

                Table {{ table[1] }}

            </option>

            {% endfor %}

        </select>


        <label>Total Price</label>

        <input type="number"
        step="0.01"
        name="total_price"
        value="{{ order['total_price'] }}"
        required>


        <label>Status</label>

        <input type="text"
        name="status"
        value="{{ order['status'] }}"
        required>


        <button type="submit">

            Update Order

        </button>

    </form>

</div>

</body>
</html>
