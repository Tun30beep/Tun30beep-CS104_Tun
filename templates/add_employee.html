<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Employee</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Add Employee</h1>

    <form method="POST">

        <label>Name</label>

        <input type="text"
        name="name"
        required>


        <label>Role</label>

        <input type="text"
        name="role"
        required>


        <label>Phone</label>

        <input type="text"
        name="phone"
        required>


        <button type="submit">

            Add Employee

        </button>

    </form>

</div>

</body>
</html>
