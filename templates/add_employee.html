<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Employee</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Add Employee</h1>

        <div class="button-group">

            <a href="/employees" class="btn btn-blue">
                ← Employees
            </a>

        </div>

        <form method="POST">

            <label>Name</label>

            <input type="text"
            name="name"
            placeholder="Enter employee name"
            required>


            <label>Role</label>

            <input type="text"
            name="role"
            placeholder="Enter role"
            required>


            <label>Phone</label>

            <input type="text"
            name="phone"
            placeholder="Enter phone number"
            required>


            <button type="submit">

                Add Employee

            </button>

        </form>

    </div>

</body>
</html>
