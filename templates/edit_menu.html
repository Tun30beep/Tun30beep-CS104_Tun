<!DOCTYPE html>
<html>

<head>

    <title>Edit Menu</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Edit Menu</h1>

    <form method="POST">

        <label>Item Name</label>

        <input type="text"
        name="item_name"
        value="{{ item['item_name'] }}"
        required>


        <label>Category</label>

        <input type="text"
        name="category"
        value="{{ item['category'] }}"
        required>


        <label>Price</label>

        <input type="number"
        step="0.01"
        name="price"
        value="{{ item['price'] }}"
        required>


        <label>Stock</label>

        <input type="number"
        name="stock"
        value="{{ item['stock'] }}"
        required>


        <button type="submit">

            Update Menu

        </button>

    </form>

</div>

</body>
</html>
