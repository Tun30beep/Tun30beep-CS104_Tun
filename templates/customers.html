<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer List</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Customer List</h1>

        <div class="button-group">

            <a href="/" class="btn btn-blue">
                ← Dashboard
            </a>

            <a href="/add_customer" class="btn btn-green">
                ➕ Add Customer
            </a>

        </div>

        <table>

            <tr>

                <th>Customer ID</th>

                <th>Name</th>

                <th>Phone</th>

                <th>Email</th>

            </tr>

            {% for customer in customers %}

            <tr>

                <td>{{ customer[0] }}</td>

                <td>{{ customer[1] }}</td>

                <td>{{ customer[2] }}</td>

                <td>{{ customer[3] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
