<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Menu</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Add Menu</h1>

    <form method="POST">

        <label>Item Name</label>

        <input type="text"
        name="item_name"
        required>


        <label>Category</label>

        <input type="text"
        name="category"
        required>


        <label>Price</label>

        <input type="number"
        step="0.01"
        name="price"
        required>


        <label>Stock</label>

        <input type="number"
        name="stock"
        required>


        <button type="submit">

            Add Menu

        </button>

    </form>

</div>

</body>
</html>
